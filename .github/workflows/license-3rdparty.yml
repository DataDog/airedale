name: LICENSE-3rdparty

# Verifies that the committed LICENSE-3rdparty.csv matches what
# dd-license-attribution produces for the current dependency closure.
#
# Notes on the generation strategy:
#   - The GitHub-SBOM strategy is disabled: it depends on GitHub's dependency
#     graph, which is only available for the pushed repository and cannot be
#     reproduced locally when regenerating the file. Dependency discovery is
#     instead driven by the PyPI strategy, which installs the project into a
#     throwaway virtualenv and reads back the resolved closure. airedale is a
#     pure-Python project, so this is complete.
#   - ScanCode / npm / GoPkg strategies are disabled: airedale has no vendored
#     sources, JS, or Go modules, and skipping them keeps the run fast and
#     deterministic (and avoids needing Node/Go toolchains).
#   - The closure includes venv-baseline packages (e.g. pip) and resolves
#     UNPINNED dependency versions, so the CSV can drift when a transitive
#     dependency publishes a new release. Regenerate with the command printed
#     on failure and run this on Python 3.14 to match how the file was created.

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  verify:
    name: verify LICENSE-3rdparty.csv
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Install dd-license-attribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install "dd-license-attribution@git+https://github.com/DataDog/dd-license-attribution.git@3dc43233d9752e0be4f1cdcf92f4b0bc5cc638ac"

      - name: Generate and verify LICENSE-3rdparty.csv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref || '' }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
          MERGE_GROUP_REF: ${{ github.event.merge_group.head_ref || '' }}
        run: |
          set -euo pipefail
          REPO_ID="DataDog/airedale"
          REPO_URL="https://github.com/${REPO_ID}"
          FLAGS="--no-github-sbom-strategy --no-gopkg-strategy --no-npm-strategy"

          if [ -f ".ddla-overrides" ]; then
            echo "Using overrides in .ddla-overrides"
            FLAGS="${FLAGS} --override-spec=.ddla-overrides"
          fi

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            # dd-license-attribution clones the canonical repo's default branch, not
            # the PR branch, so mirror the canonical URL to the PR head repo/branch.
            # Build the JSON with a real encoder so odd (but valid) branch names
            # can't break or inject structure into the file.
            python3 - "${REPO_URL}" "${PR_HEAD_REPO}" "${HEAD_REF}" "${GITHUB_TOKEN}" > mirrors.json <<'PY'
          import json, sys
          repo_url, head_repo, head_ref, token = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          json.dump(
              [{
                  "original_url": repo_url,
                  "mirror_url": f"https://git:{token}@github.com/{head_repo}",
                  "ref_mapping": {"branch:main": f"branch:{head_ref}"},
              }],
              sys.stdout,
          )
          PY
            echo "Scanning PR branch ${HEAD_REF} from ${PR_HEAD_REPO}"
          else
            # push -> scan `main`; merge_group -> scan the temporary
            # `gh-readonly-queue/...` branch that carries the queued changes.
            # Both branches live in the canonical repo, so mirror onto it.
            if [ "${EVENT_NAME}" = "merge_group" ]; then
              TARGET_BRANCH="${MERGE_GROUP_REF#refs/heads/}"
            else
              TARGET_BRANCH="main"
            fi
            python3 - "${REPO_URL}" "${REPO_ID}" "${GITHUB_TOKEN}" "${TARGET_BRANCH}" > mirrors.json <<'PY'
          import json, sys
          repo_url, repo_id, token, target = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          json.dump(
              [{
                  "original_url": repo_url,
                  "mirror_url": f"https://git:{token}@github.com/{repo_id}",
                  "ref_mapping": {"branch:main": f"branch:{target}"},
              }],
              sys.stdout,
          )
          PY
            echo "Scanning branch ${TARGET_BRANCH} from ${REPO_ID}"
          fi

          # Make sure this is cleaned up even if the script fails.
          trap 'rm -f mirrors.json' EXIT

          dd-license-attribution generate-sbom ${FLAGS} --use-mirrors=mirrors.json "${REPO_URL}" > ddla-output.csv

          if ! cmp -s LICENSE-3rdparty.csv ddla-output.csv; then
            echo "::error::LICENSE-3rdparty.csv is out of date."
            echo "Regenerate it (on Python 3.14) with:"
            echo "  dd-license-attribution generate-sbom ${FLAGS} ${REPO_URL} > LICENSE-3rdparty.csv"
            echo "----- diff (committed <=> generated) -----"
            diff -u LICENSE-3rdparty.csv ddla-output.csv || true
            exit 1
          fi
          echo "LICENSE-3rdparty.csv is up to date."

      - name: Upload generated CSV on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ddla-output
          path: ddla-output.csv
          if-no-files-found: ignore
