# example experiment.toml
# ---------------------------------------------------------------------------
# Required: LLMObs ml_app and project name.
project = "my-evals"
description = "Example evaluation suite"

# Required: provider-qualified models to evaluate.
models = ["anthropic/claude-sonnet-4-6", "openai/gpt-4.1"]

# Optional: judge model for rubric scoring (default shown).
judge_model = "anthropic/claude-sonnet-4-6"

# Optional: stable dataset name (defaults to `project`).
dataset_name = "my-evals"

# Optional: how many times to run each (model, scenario, task) cell.
runs = 1

# ---------------------------------------------------------------------------
# Shared registries.
# ---------------------------------------------------------------------------
# Skills and MCP servers are defined ONCE here and referenced by name from
# scenarios (and from [defaults]). This avoids copy-paste when the same skill or
# server is reused across scenarios.

# Skill registry: name -> Agent Skill directory.
[skills]
apm = "./skills/apm"

# MCP server registry. Each block uses the same field model as a `.mcp.json`
# entry; `type` is inferred from `url` (http) or `command` (stdio).

# HTTP-transport MCP server with optional auto-start.
[mcp_servers.apm]
url = "http://localhost:8000/mcp"
headers = { source = "evals" }
tool_names = ["search_apm_libraries", "get_apm_docs"]
# Optional managed auto-start: when `command` is set on an http server it is the
# command used to launch the server if it is unreachable. Reachability is probed
# via the MCP protocol itself (a tools/list call). `url` MUST then be localhost.
command = "python"
args = ["-m", "my_mcp_server"]
env = { MCP_MODE = "both" }

# stdio-transport MCP server launched directly by the agent SDK. `type` is
# inferred as "stdio" because `command` is set and there is no `url`.
[mcp_servers.tools]
command = "python"
args = ["-m", "my_stdio_server"]
env = { TOOL_MODE = "read-only" }
tool_names = ["do_thing"]

# ---------------------------------------------------------------------------
# Defaults applied to every scenario unless the scenario sets the same field.
# A scenario that sets a field overrides the default ENTIRELY (no merging).
# ---------------------------------------------------------------------------
[defaults]
max_turns = 64
effort = "medium"
# Optional defaults for the list/table fields too:
# system_prompt = "Prefer MCP tools over internal knowledge."
# skills = ["apm"]
# allowed_builtin_tools = ["Read", "Grep", "Glob"]
# mcp_servers = ["apm"]

# ---------------------------------------------------------------------------
# Scenarios: named runtime environments for the model. They reference shared
# skills / MCP servers by name.
# ---------------------------------------------------------------------------

# Scenario A: full MCP orchestrator. `system_prompt` is optional. With
# `allowed_builtin_tools` omitted, ALL built-in tools are allowed.
[scenarios.fat-mcp]
description = "Full MCP orchestrator tool"
system_prompt = "Prefer MCP tools over internal knowledge."
skills = ["apm"]
mcp_servers = ["apm"]

# Scenario B: lock the surface down to a specific built-in allow-list and no MCP.
[scenarios.builtin-only]
description = "Model answers with a restricted built-in allow-list; no MCP."
allowed_builtin_tools = ["Read", "Grep"]
max_turns = 32
effort = "low"

# Scenario C: stdio MCP server, no built-in tools at all (empty list).
[scenarios.local-tools]
description = "Stdio MCP server only; built-in tools disabled."
allowed_builtin_tools = []
mcp_servers = ["tools"]

# Scenario D: run inside a git worktree of a repository. Without a `workdir`
# block the agent runs in a fresh empty temp dir (hermetic sandbox). With one,
# each run/repetition gets a fresh `git worktree` of a cached clone, and the
# repo's own project config (.claude/.codex/AGENTS.md/.mcp.json) is honored.
[scenarios.repo-workspace]
description = "Run against a checkout of this repository at a fixed ref."
allowed_builtin_tools = ["Read", "Grep", "Glob"]
# `workdir` is also defaultable via [defaults.workdir]; a scenario that sets it
# replaces the default entirely (no merge).
[scenarios.repo-workspace.workdir]
repo = "self"          # "self" (repo containing this file) | a git URL | a local path
ref  = "main"          # optional; default = source repo's current HEAD
# Ordered setup steps applied inside each fresh worktree (all optional):
[[scenarios.repo-workspace.workdir.steps]]
op    = "restore"      # git restore --source=<from> -- <paths...> (requires a repo)
from  = "v1.0.0"
paths = ["src/**"]
[[scenarios.repo-workspace.workdir.steps]]
op    = "remove"       # filesystem-delete matching globs from the worktree
paths = ["secrets/**"]
[[scenarios.repo-workspace.workdir.steps]]
op      = "write"      # create/overwrite a file; exactly one of content/source
path    = "NOTES.md"
content = "Evaluate the change described in the task.\n"

# ---------------------------------------------------------------------------
# Tasks: prompts + evaluation criteria. Table key = task id (unique by
# construction, since TOML forbids duplicate keys).
# ---------------------------------------------------------------------------

[tasks.ssi_overview]
description = "[glossary] SSI definition"
prompt = "What is Single Step Instrumentation (SSI)?"
context = "Answer in the context of Datadog APM language instrumentation."
criteria = [
    "Correctly defines Single Step Instrumentation",
    "Mentions that it instruments without modifying application code",
    "Names at least two supported languages",
]
latency_threshold_ms = 30000

[tasks.otel_vs_dd]
description = "[comparison] OpenTelemetry vs Datadog tracing"
prompt = "Compare OpenTelemetry and Datadog native tracing for a Python service."
criteria = [
    "Explains the OpenTelemetry semantic conventions approach",
    "Describes Datadog's proprietary tracing SDK",
    "Notes interoperability between the two",
]
